<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <!-- ============ SIDEBAR (0..280) ============ -->
  <rect x="0" y="0" width="280" height="800" />

  <!-- Top bar: company name + search -->
  <text x="16" y="30" font-size="14" font-weight="700" stroke="none" fill="#000">Paperclip App</text>
  <rect x="240" y="12" width="24" height="24" rx="4" fill="#e6e6e6" stroke="#666" />
  <circle cx="249" cy="21" r="4" fill="none" stroke="#666" />
  <line x1="252" y1="24" x2="256" y2="28" stroke="#666" />

  <!-- ===== Top cluster (no section label) ===== -->
  <!-- Conference room (NEW) — chat bubble icon -->
  <g>
    <rect x="8" y="56" width="264" height="32" fill="#fff" stroke="none" />
    <rect x="16" y="62" width="18" height="13" rx="3" fill="none" stroke="#000" />
    <polygon points="20,75 20,81 26,75" fill="#000" stroke="none" />
    <text x="44" y="77" font-size="14" stroke="none" fill="#000">Conference room</text>
  </g>
  <!-- New Task -->
  <g>
    <rect x="16" y="94" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
    <line x1="20" y1="106" x2="28" y2="98" stroke="#666" />
    <text x="44" y="109" font-size="14" stroke="none" fill="#000">New Task</text>
  </g>
  <!-- Dashboard -->
  <rect x="16" y="126" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="141" font-size="14" stroke="none" fill="#666">Dashboard</text>
  <!-- Inbox -->
  <rect x="16" y="158" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="173" font-size="14" stroke="none" fill="#666">Inbox</text>

  <!-- ===== WORK section ===== -->
  <text x="16" y="206" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">WORK</text>
  <!-- Tasks (renamed from Issues) -->
  <rect x="16" y="216" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="231" font-size="14" stroke="none" fill="#666">Tasks</text>
  <!-- Routines -->
  <rect x="16" y="248" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="263" font-size="14" stroke="none" fill="#666">Routines</text>
  <!-- Goals -->
  <rect x="16" y="280" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="295" font-size="14" stroke="none" fill="#666">Goals</text>
  <!-- Workspaces -->
  <rect x="16" y="312" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="327" font-size="14" stroke="none" fill="#666">Workspaces</text>
  <!-- Artifacts (NEW) -->
  <rect x="16" y="344" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="359" font-size="14" stroke="none" fill="#000">Artifacts</text>
  <!-- Projects (NEW nav item) — shown active/selected -->
  <rect x="8" y="370" width="264" height="32" fill="#e6e6e6" stroke="none" />
  <rect x="16" y="378" width="16" height="13" rx="2" fill="#fff" stroke="#000" />
  <path d="M16 381 l5 0 l2 -3 l4 0" fill="none" stroke="#000" />
  <text x="44" y="391" font-size="14" stroke="none" fill="#000">Projects</text>

  <!-- ===== AGENTS section (active state) ===== -->
  <text x="16" y="438" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">AGENTS</text>
  <text x="248" y="438" font-size="14" stroke="none" fill="#666">+</text>
  <g>
    <circle cx="24" cy="458" r="8" fill="#e6e6e6" stroke="#666" />
    <text x="44" y="463" font-size="14" stroke="none" fill="#666">ClaudeCoder</text>
    <circle cx="214" cy="458" r="3" fill="#000" stroke="none" />
    <text x="224" y="462" font-size="12" stroke="none" fill="#666">2 live</text>
  </g>
  <g>
    <circle cx="24" cy="490" r="8" fill="#e6e6e6" stroke="#666" />
    <text x="44" y="495" font-size="14" stroke="none" fill="#666">QA-Bot</text>
    <circle cx="214" cy="490" r="3" fill="#000" stroke="none" />
    <text x="224" y="494" font-size="12" stroke="none" fill="#666">1 live</text>
  </g>
  <!-- See all agents -->
  <text x="44" y="527" font-size="14" stroke="none" fill="#000">See all agents →</text>

  <!-- ===== COMPANY section ===== -->
  <text x="16" y="574" font-size="12" font-weight="600" letter-spacing="1" stroke="none" fill="#666">COMPANY</text>
  <rect x="16" y="584" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="599" font-size="14" stroke="none" fill="#666">Org</text>
  <rect x="16" y="616" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="631" font-size="14" stroke="none" fill="#666">Skills</text>
  <rect x="16" y="648" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="663" font-size="14" stroke="none" fill="#666">Costs</text>
  <rect x="16" y="680" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="695" font-size="14" stroke="none" fill="#666">Activity</text>
  <rect x="16" y="712" width="16" height="16" rx="3" fill="#e6e6e6" stroke="#666" />
  <text x="44" y="727" font-size="14" stroke="none" fill="#666">Settings</text>

  <!-- ============ CONTENT AREA (context only) ============ -->
  <text x="320" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Main content area</text>
  <line x1="320" y1="56" x2="1256" y2="56" stroke="#666" />
  <text x="320" y="84" font-size="14" stroke="none" fill="#666">(Selected nav item renders here — e.g. clicking Projects opens the projects list view)</text>

  <!-- legend of changes -->
  <g transform="translate(320,120)">
    <rect width="700" height="276" rx="6" fill="#fff" stroke="#666" />
    <text x="20" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Left nav — final structure (per board direction)</text>
    <text x="20" y="62" font-size="14" stroke="none" fill="#000">1  Conference room — NEW top-level item (chat bubble), placeholder page</text>
    <text x="20" y="88" font-size="14" stroke="none" fill="#000">2  New Issue  →  New Task; standard nav label color</text>
    <text x="20" y="114" font-size="14" stroke="none" fill="#000">3  Issues  →  Tasks — renamed globally across the frontend</text>
    <text x="20" y="140" font-size="14" stroke="none" fill="#000">4  Artifacts — NEW Work item</text>
    <text x="20" y="166" font-size="14" stroke="none" fill="#000">5  Projects — NEW Work item (bottom of Work); opens the projects list view</text>
    <text x="20" y="192" font-size="14" stroke="none" fill="#d33">6  REMOVED: the old collapsible PROJECTS section (per-project rows in nav)</text>
    <text x="20" y="218" font-size="14" stroke="none" fill="#000">7  Agents — active only (or 5 recently active) + “See all agents”</text>
    <text x="20" y="250" font-size="12" stroke="none" fill="#666">Work order: Tasks · Routines · Goals · Workspaces · Artifacts · Projects</text>
  </g>

  <!-- ============ ANNOTATION LAYER (red dashed) ============ -->
  <g data-region="annotations">
    <rect x="8" y="56" width="264" height="32" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,72)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text></g>

    <rect x="8" y="92" width="264" height="20" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,104)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text></g>

    <rect x="8" y="214" width="264" height="20" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,224)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>

    <rect x="8" y="342" width="264" height="20" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,352)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text></g>

    <g transform="translate(286,386)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>

    <rect x="8" y="424" width="264" height="112" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(286,480)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">7</text></g>
  </g>
</svg>
