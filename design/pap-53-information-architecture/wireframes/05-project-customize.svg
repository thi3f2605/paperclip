<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <rect x="0" y="0" width="1280" height="800" />

  <text x="48" y="48" font-size="28" font-weight="700" stroke="none" fill="#000">Project tile — change color (folder icon fixed)</text>
  <text x="48" y="80" font-size="14" stroke="none" fill="#666">Default is a neutral gray rounded rectangle with a folder icon. Color is user-customizable now; the icon stays a folder for this phase.</text>

  <!-- default tile -->
  <text x="48" y="140" font-size="20" font-weight="600" stroke="none" fill="#000">Default (neutral gray)</text>
  <g transform="translate(48,160)">
    <rect width="40" height="32" rx="8" fill="#e6e6e6" stroke="#666" />
    <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#666" />
  </g>
  <text x="104" y="182" font-size="14" stroke="none" fill="#666">Onboarding v3</text>

  <!-- customized examples (color changes, folder icon stays) -->
  <text x="48" y="248" font-size="20" font-weight="600" stroke="none" fill="#000">After choosing a color (icon unchanged)</text>
  <g transform="translate(48,268)">
    <rect width="40" height="32" rx="8" fill="#fff" stroke="#000" />
    <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#000" />
  </g>
  <g transform="translate(104,268)">
    <rect width="40" height="32" rx="8" fill="#e6e6e6" stroke="#000" />
    <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#000" />
  </g>
  <g transform="translate(160,268)">
    <rect width="40" height="32" rx="8" fill="#666" stroke="#000" />
    <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#fff" />
  </g>
  <text x="216" y="290" font-size="12" stroke="none" fill="#666">(swatch fills shown as grays — monochrome wireframe; real palette is color)</text>

  <!-- picker popover (color only) -->
  <text x="48" y="356" font-size="20" font-weight="600" stroke="none" fill="#000">Color picker popover</text>
  <g transform="translate(48,376)">
    <rect width="320" height="232" rx="8" fill="#fff" stroke="#000" />
    <text x="20" y="36" font-size="14" font-weight="600" stroke="none" fill="#000">Project color</text>
    <line x1="0" y1="56" x2="320" y2="56" stroke="#666" />

    <!-- preview tile -->
    <text x="20" y="84" font-size="12" stroke="none" fill="#666">Preview</text>
    <g transform="translate(20,92)">
      <rect width="40" height="32" rx="8" fill="#e6e6e6" stroke="#666" />
      <path d="M10 12 l9 0 l3 -4 l8 0 l0 16 l-20 0 z" fill="#fff" stroke="#666" />
    </g>
    <text x="72" y="113" font-size="12" stroke="none" fill="#666">folder icon is fixed</text>

    <!-- color swatches grid -->
    <text x="20" y="156" font-size="12" stroke="none" fill="#666">Color</text>
    <rect x="20" y="166" width="28" height="28" rx="6" fill="#e6e6e6" stroke="#000" />
    <rect x="56" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="92" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="128" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="164" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="200" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="236" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />
    <rect x="272" y="166" width="28" height="28" rx="6" fill="#fff" stroke="#666" />

    <!-- footer -->
    <g transform="translate(20,200)"><rect width="120" height="0" /></g>
    <line x1="0" y1="200" x2="320" y2="200" stroke="#666" />
  </g>
  <!-- footer actions placed below popover for clarity -->
  <g transform="translate(48,624)"><rect width="128" height="32" rx="4" fill="#fff" stroke="#666" /><text x="64" y="21" font-size="12" text-anchor="middle" stroke="none" fill="#000">Reset to gray</text></g>
  <g transform="translate(288,624)"><rect width="80" height="32" rx="4" fill="#000" /><text x="40" y="21" font-size="12" text-anchor="middle" stroke="none" fill="#fff">Save</text></g>

  <g data-region="annotations">
    <rect x="48" y="160" width="40" height="32" fill="none" stroke="#d33" stroke-dasharray="6 3" />
    <g transform="translate(104,144)"><circle r="11" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text y="4" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>
    <text x="448" y="416" font-size="14" stroke="none" fill="#d33">— Phase 1: color only. The icon grid (custom icons) is deferred; every tile shows a folder.</text>
    <text x="448" y="440" font-size="14" stroke="none" fill="#d33">— Persisting color already exists (project.color). No new field needed for this phase.</text>
    <text x="448" y="464" font-size="14" stroke="none" fill="#d33">— Tiles appear in the Projects list rows and the project detail header (the old sidebar</text>
    <text x="448" y="484" font-size="14" stroke="none" fill="#d33">   per-project list is removed), so the color control lives on the project itself.</text>
  </g>
</svg>
